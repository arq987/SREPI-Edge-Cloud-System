<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>SREPI - Centro de Control</title>
    <!-- Importamos nuestro CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Pantalla principal de acceso -->
</head>
<body>

    <div class="page">
        <header class="hero">
            <div class="hero-text">
                <p class="eyebrow">SREPI Control Center</p>
                <h1>SREPI - Centro de Control</h1>
                <p class="hero-sub">Selecciona el modulo que deseas abrir.</p>
            </div>
        </header>

        <main class="landing">
            <div class="landing-grid">
                <a class="link-card" href="./views/kiosco.html">
                    <div>
                        <p class="link-eyebrow">Modulo</p>
                        <h2>Punto Express (Kiosco)</h2>
                        <p class="descripcion">Escaneo QR, validacion y entrega de productos.</p>
                    </div>
                    <span class="link-cta">Abrir kiosco</span>
                </a>
                <a class="link-card" href="./views/admin.html">
                    <div>
                        <p class="link-eyebrow">Administracion</p>
                        <h2>Panel DDA y Gamificacion</h2>
                        <p class="descripcion">Ajusta umbrales, descuentos y XP base.</p>
                    </div>
                    <span class="link-cta">Abrir panel</span>
                </a>
            </div>
        </main>
    </div>
</body>
</html>
